{% extends "base.html" %}
{% block title %}Historial de PDFs{% endblock %}

{% block content %}

<div class="max-w-6xl mx-auto px-6 py-8">

    
    <div class="Historial-Completo mb-8">
        <div class="Titulo-descrip">
            <h1 class="Titulo font-semibold text-2xl text-gray-800 tracking-tight">Historial de PDFs</h1>
            <p class="description mt-2 text-gray-500 text-sm">
                Gestiona tus PDFs de manera fácil
            </p>
        </div>
    </div>

    
    <div class="Filtros bg-[#FAF9F6] p-5 rounded-lg shadow-sm border border-gray-100 mb-8">
        <form enctype="multipart/form-data" id="form-filtros" class="flex flex-wrap items-center gap-4" action="" method="POST">
            
            <input type="date" name="fecha-Filtro" class="p-2 bg-[#E8E6E3] focus:outline-none focus:ring-2 focus:ring-[#6FD1D7] rounded-md text-sm text-gray-700" id="fecha-filtro">
            
            <input type="text" name="nombreArchivo-Filtro" class="p-2 bg-[#E8E6E3] focus:outline-none focus:ring-2 focus:ring-[#6FD1D7] rounded-md text-sm placeholder-gray-500" placeholder="nombre archivo" id="nombreArchivo-filtro">
            
            <input type="text" name="nombreCreador-Filtro" class="p-2 bg-[#E8E6E3] focus:outline-none focus:ring-2 focus:ring-[#6FD1D7] rounded-md text-sm placeholder-gray-500" placeholder="nombre creador" id="nombreCreador-filtro">
            
            <input type="submit" value="Buscar" id="buscar-filtro" class="bg-[#3B7597] px-4 py-2 rounded-md text-[#FFFFFF] text-sm font-medium cursor-pointer hover:bg-[#093C5D] transition-colors duration-200 ease-in-out">
            
            <input type="reset" value="Limpiar" class="bg-red-600 px-4 py-2 rounded-md text-[#FFFFFF] text-sm font-medium cursor-pointer hover:bg-red-700 transition-colors duration-200 ease-in-out" id="limpiar-filtro">
            
        </form>
    </div>

   
    <div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm bg-white">
        <table class="tabla-Historial min-w-full table-auto border-collapse">
            <thead class="tablaHeader-Historial bg-gray-50 text-gray-700 text-sm font-semibold">
                <tr> 

                    <th class="px-6 py-3 text-left">Nombre</th>
                    <th class="px-6 py-3 text-left">Fecha</th>
                    <th class="px-6 py-3 text-left">Creador</th>
                    <th class="px-6 py-3 text-center">Acciones</th>                
                </tr>
            </thead>

          
            <tbody class="tablaCuerpo-Historial divide-y divide-gray-200 text-sm text-gray-600">
            </tbody>
        </table>
    </div>

</div>


<script type="module" src="{{ url_for('static', filename='JS/modules/uiTablasHistorial.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='JS/modules/historial_filtros.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='JS/modules/historial_filtroCreador.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='JS/modules/historial_filtroNombreArchivo.js') }}"></script>
{% endblock %}
